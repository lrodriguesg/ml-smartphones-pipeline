name: 'ecommerce_pipeline'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_pipeline'

model-paths: ["models"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]


models:
  ecommerce_pipeline:
    # A pasta staging vai para o schema 'staging'
    staging:
      +materialized: view
      +schema: staging
      
    # A pasta marts vai para o schema 'marts'
    marts:
      +materialized: table
      +schema: marts